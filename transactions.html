<!DOCTYPE html>
<html>
<head>
<title>FinTrack Pro - Transactions</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}


body{
    background:#0f172a;
    min-height:100vh;
    margin:0;
    padding:0;
    color:#e2e8f0;
}


.container{
    width:100%;
    min-height:100vh;
    background:#111827;
}


.header{
    background:linear-gradient(
        135deg,
        #0f172a,
        #1e293b
    );
    color:white;
    padding:35px;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

.header h1{
    font-size:38px;
    font-weight:700;
}

.header p{
    margin-top:10px;
    color:#94a3b8;
}

/* NAVBAR */

/* NAVIGATION */

nav{
background:#0b1220;
padding:18px 50px;
display:flex;
gap:20px;
align-items:center;
border-bottom:1px solid rgba(255,255,255,0.05);
}

nav a{
color:#94a3b8;
text-decoration:none;
font-size:15px;
font-weight:600;
padding:12px 18px;
border-radius:12px;
transition:.3s;
}

nav a:hover{
background:#1e293b;
color:white;
}

nav a.active{
background:#1e293b;
color:white;
}

/* FORM */

.form-section{
    padding:30px;
}

.form-section h2{
    color:white;
    margin-bottom:20px;
}

/* DASHBOARD */
.dashboard{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    padding:30px;
}

.card{
    padding:24px;
    border-radius:18px;
    color:white;
    transition:.3s;
    cursor:pointer;
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:none;
}


/* COLORS */
.income-card{ background:linear-gradient(135deg,#16a34a,#22c55e); }
.expense-card{ background:linear-gradient(135deg,#dc2626,#ef4444); }
.balance-card{ background:linear-gradient(135deg,#1e3a8a,#3b82f6); }

.card h3{
    font-size:15px;
    opacity:.9;
}

.card p{
    font-size:32px;
    margin-top:10px;
    font-weight:700;
}

/* CHART CONTAINER */
.chart-box{
    padding:20px;
    display:flex;
    justify-content:center;
}

canvas{
    max-width:320px;
    max-height:320px;
    background:#1e293b;
    padding:15px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.05);
}

.inputs{

    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;

}

input,
select{
    padding:14px;
    border:1px solid #334155;
    border-radius:12px;
    font-size:15px;
    background:#1e293b;
    color:white;
}

input::placeholder{
    color:#94a3b8;
}



button{
    padding:13px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    transition:.3s;
    font-weight:600;
}

button:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
}

.transfer{

    color:#2563eb;
    font-weight:bold;

}

.add-btn{

    margin-top:20px;
    width:200px;

}



/* FILTER AREA */


.filter-box{
    padding:0 30px 25px;
    display:flex;
    gap:15px;
}


.filter-box input,
.filter-box select{

    flex:1;

}


/* TABLE */


.table-section{
    padding:30px;
}


table{

    width:100%;
    border-collapse:collapse;

}



th{
    background:#1e293b;
    color:#60a5fa;
    padding:14px;
}

td{
    padding:14px;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,0.05);
    color:#e2e8f0;
}


tr{
    transition:.3s;
}

tr:hover{
    background:#1e293b;
}


/* COLOR CODING */


.income{

    color:#16a34a;
    font-weight:bold;

}


.expense{

    color:#dc2626;
    font-weight:bold;

}



.category{
    background:#1e40af;
    padding:6px 12px;
    border-radius:20px;
    color:white;
    font-size:13px;
}



/* ACTION BUTTONS */


.edit{

    background:#2563eb;

}


.delete{

    background:#dc2626;

}


.edit:hover{

    background:#1d4ed8;

}


.delete:hover{

    background:#b91c1c;

}




@media(max-width:800px){

.inputs{

grid-template-columns:1fr;

}

.filter-box{

flex-direction:column;

}

}


</style>

</head>


<body>


<div class="container">


<div class="header">

<h1>FinTrack Pro</h1>
<p>Transaction Management Dashboard</p>

</div>

<nav>

<a href="dashboard.html">Dashboard</a>

<a href="transactions.html" class="active">Transactions</a>

<a href="accounts.html">Accounts</a>

<a href="budgets.html">Budgets</a>

<a href="reports.html">Reports</a>

</nav>

<!-- DASHBOARD SUMMARY -->
<div class="dashboard">

    <div class="card income-card">
        <h3>Total Income</h3>
        <p id="totalIncome">$ 0</p>
    </div>

    <div class="card expense-card">
        <h3>Total Expense</h3>
        <p id="totalExpense">$ 0</p>
    </div>

    <div class="card balance-card">
        <h3>Net Balance</h3>
        <p id="netBalance">$ 0</p>
    </div>

</div>

<!-- CHART -->
<div class="chart-box">
    <canvas id="financeChart"></canvas>
</div>

<div class="form-section">


<h2>Add / Edit Transaction</h2>


<div class="inputs">


<input id="title" placeholder="Transaction Name">


<input id="amount" type="number" placeholder="Amount">


<select id="transactionType">

<option value="Expense">Expense</option>
<option value="Income">Income</option>

</select>



<select id="category">

<option>Food & Dining</option>
<option>Shopping</option>
<option>Transportation</option>
<option>Bills & Utilities</option>
<option>Entertainment</option>
<option>Healthcare</option>
<option>Education</option>
<option>Other Expense</option>

</select>


<input id="date" type="date">
<select id="accountSelect">

<option>Select Account</option>

</select>


</div>


<button class="add-btn" onclick="saveTransaction()">
Add Transaction
</button>


</div>





<div class="filter-box">


<input 
placeholder="Search Transaction..."
id="search"
onkeyup="displayTransactions()">



<select id="filterCategory" onchange="displayTransactions()">

<option value="All">All Categories</option>
<option>Food & Dining</option>
<option>Shopping</option>
<option>Transportation</option>
<option>Bills & Utilities</option>
<option>Entertainment</option>
<option>Healthcare</option>
<option>Education</option>

</select>



<select id="sort" onchange="displayTransactions()">

<option value="none">Sort By</option>
<option value="date">Date</option>
<option value="amount">Amount</option>

</select>



</div>






<div class="table-section">


<h2>Transaction History</h2>


<br>


<table>


<thead>

<tr>

<th>Name</th>
<th>Amount</th>
<th>Type</th>
<th>Category</th>
<th>Date</th>
<th>Actions</th>

</tr>

</thead>


<tbody id="transactionList">


</tbody>


</table>


</div>



</div>





<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>

let financeChart;

let transactions =
JSON.parse(localStorage.getItem("transactions")) || [];

let editIndex=-1;

function loadAccounts(){

    let accounts =
    JSON.parse(localStorage.getItem("accounts")) || [];


    let dropdown = document.getElementById("accountSelect");


    dropdown.innerHTML="";


    if(accounts.length == 0){

        dropdown.innerHTML = `
        <option>No Accounts Found</option>
        `;

        return;

    }


    accounts.forEach((acc,index)=>{


        dropdown.innerHTML += `

        <option value="${index}">
        ${acc.name}
        </option>

        `;


    });


}

function clearForm(){

title.value="";
amount.value="";
date.value="";

transactionType.value="Expense";

category.value="Food & Dining";

}

function saveTransaction(){


if(accountSelect.value=="No Accounts Found"){

alert("Please create an account first");
return;

}


if(
title.value.trim()=="" ||
amount.value=="" ||
date.value==""
){

alert("Please fill all fields");
return;

}



let data={

title:title.value,

amount:Number(amount.value),

type:transactionType.value,

category:category.value,

date:date.value,

account:Number(accountSelect.value)

};



transactions.push(data);



let accounts =
JSON.parse(localStorage.getItem("accounts")) || [];



let accIndex = Number(accountSelect.value);



if(accounts[accIndex]){


if(transactionType.value=="Income"){


accounts[accIndex].balance += Number(amount.value);


}
else{


accounts[accIndex].balance -= Number(amount.value);


}


}



localStorage.setItem(
"accounts",
JSON.stringify(accounts)
);



localStorage.setItem(
"transactions",
JSON.stringify(transactions)
);



clearForm();

displayTransactions();

updateDashboard();


alert("Transaction Added");


}


function displayTransactions(){



let list=document.getElementById("transactionList");

list.innerHTML="";



let searchText=search.value.toLowerCase();


let selected=filterCategory.value;



let result=transactions.filter(t=>{


return (

t.title.toLowerCase().includes(searchText)

&&

(selected=="All" || t.category==selected)

);


});



if(sort.value=="amount"){

result.sort((a,b)=>b.amount-a.amount);

}



if(sort.value=="date"){

result.sort((a,b)=>new Date(b.date)-new Date(a.date));

}






result.forEach((t,index)=>{



list.innerHTML+=`


<tr>


<td>${t.title}</td>


<td class="${
t.type=="Income"
?"income"
:t.type=="Expense"
?"expense"
:"transfer"
}">

${t.type=="Income"?"+":"-"} $ ${t.amount}

</td>


<td>${t.type}</td>


<td>

<span class="category">
${t.category}
</span>

</td>


<td>${t.date}</td>


<td>


<button class="edit" onclick="editTransaction(${index})">
Edit
</button>


<button class="delete" onclick="deleteTransaction(${index})">
Delete
</button>


</td>


</tr>



`;



});



}







function editTransaction(i){


let t=transactions[i];


title.value=t.title;
amount.value=t.amount;
transactionType.value=t.type;
category.value=t.category;
date.value=t.date;
accountSelect.value=t.account;


editIndex=i;


window.scrollTo(0,0);


}







function deleteTransaction(i){


if(confirm("Delete this transaction?")){


let deleted = transactions[i];

let accounts =
JSON.parse(localStorage.getItem("accounts")) || [];


// restore account balance

if(accounts[0]){

if(deleted.type=="Income"){

    accounts[0].balance -= deleted.amount;

}
else{

    accounts[0].balance += deleted.amount;

}

}


localStorage.setItem(
"accounts",
JSON.stringify(accounts)
);



transactions.splice(i,1);



localStorage.setItem(
"transactions",
JSON.stringify(transactions)
);



displayTransactions();

updateDashboard();


}


}


function updateDashboard(){

let income = 0;
let expense = 0;

transactions.forEach(t => {
    if(t.type === "Income"){
        income += t.amount;
    } else {
        expense += t.amount;
    }
});

let balance = income - expense;

/* update cards */
document.getElementById("totalIncome").innerText = "$ " + income;
document.getElementById("totalExpense").innerText = "$ " + expense;
document.getElementById("netBalance").innerText = "$ " + balance;

/* update chart */
updateChart(income, expense);

}

function updateChart(income, expense){

let ctx =
document.getElementById("financeChart")
.getContext("2d");


if(financeChart){

financeChart.destroy();

}



financeChart = new Chart(ctx,{

type:"pie",

data:{

labels:["Income","Expense"],

datasets:[{

data:[
income,
expense
],

backgroundColor:[
"#22c55e",
"#ef4444"
]

}]

},


options:{

responsive:true

}


});

}


loadAccounts();
displayTransactions();
updateDashboard();

</script>


</body>
</html>
