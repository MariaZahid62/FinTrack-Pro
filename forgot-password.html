<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password - FinTrack Pro</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#0f172a;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.reset-container{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

.reset-box{
    width:500px;
    max-width:95%;
    background:white;
    padding:45px;
    border-radius:20px;
    box-shadow:0 20px 50px rgba(0,0,0,0.25);
    text-align:center;
}

.reset-logo{
    font-size:30px;
    font-weight:700;
    color:#0f172a;
    margin-bottom:10px;
}

.reset-box h2{
    font-size:28px;
    color:#0f172a;
    margin-bottom:12px;
}

.reset-box p{
    color:#64748b;
    line-height:1.7;
    margin-bottom:30px;
    font-size:15px;
}

.input-box{
    margin-bottom:20px;
}

.input-box input{
    width:100%;
    padding:15px 18px;
    border:1px solid #dbe3ec;
    border-radius:12px;
    font-size:15px;
    outline:none;
    transition:0.3s;
}

.input-box input:focus{
    border-color:#2563eb;
}

.reset-box button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#1e293b;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.reset-box button:hover{
    background:#0f172a;
}

.back-link{
    display:inline-block;
    margin-top:22px;
    text-decoration:none;
    color:#2563eb;
    font-weight:600;
}

.security{
    margin-top:30px;
    padding:16px;
    border-radius:14px;
    background:#f8fafc;
    border:1px solid #e2e8f0;
    text-align:center;
    color:#475569;
    font-size:14px;
    font-weight:500;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
}

.security i{
    color:#10b981;
    font-size:18px;
}

@media(max-width:600px){

    .reset-box{
        padding:30px;
    }

    .reset-box h2{
        font-size:30px;
    }
}
</style>

</head>
<body>

<div class="reset-container">

    <div class="reset-box">

        <div class="reset-logo">
           
        </div>

        <h2>Forgot Password?</h2>

        <p>
            Enter your registered email address and we'll send
            you a secure password reset link.
        </p>

        <form id="resetForm">

            <div class="input-box">
                <input
                    type="email"
                    id="resetEmail"
                    placeholder="name@company.com"
                    required>
            </div>

            <button type="submit">
                Send Reset Link
            </button>

        </form>

        <a href="index.html" class="back-link">
            ← Back to Login
        </a>

        <div class="security">
            🔒 Secure password recovery & encrypted account protection
        </div>

    </div>

</div>

<script>
document.getElementById("resetForm").addEventListener("submit", function(e){
    e.preventDefault();

    const email = document.getElementById("resetEmail").value;

    if(email){
        alert("Password reset link sent to: " + email);
    }
});
</script>

</body>
</html>
