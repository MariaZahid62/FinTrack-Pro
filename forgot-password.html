<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password - FinTrack Pro</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f7fc;
}

.reset-container{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f4f7fc;
}

.reset-box{
    width:400px;
    max-width:90%;
    background:white;
    padding:35px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    text-align:center;
}

.reset-box h2{
    margin-bottom:15px;
    color:#1e3a8a;
}

.reset-box p{
    margin-bottom:20px;
    color:#666;
    line-height:1.6;
}

.reset-box input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:14px;
}

.reset-box button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#1e3a8a;
    color:white;
    cursor:pointer;
    font-size:16px;
    font-weight:600;
    transition:0.3s;
}

.reset-box button:hover{
    background:#152c6b;
}

.reset-box a{
    display:inline-block;
    margin-top:15px;
    text-decoration:none;
    color:#1e3a8a;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="reset-container">

    <div class="reset-box">

        <h2>Forgot Password</h2>

        <p>
            Enter your registered email address and we'll
            send you a password reset link.
        </p>

        <form id="resetForm">

            <input
                type="email"
                id="resetEmail"
                placeholder="Enter Email Address"
                required
            >

            <button type="submit">
                Send Reset Link
            </button>

        </form>

        <a href="index.html">← Back to Login</a>

    </div>

</div>

<script>
document.getElementById("resetForm").addEventListener("submit", function(e){
    e.preventDefault();

    const email = document.getElementById("resetEmail").value;

    if(email){
        alert("Password reset link sent to: " + email);
    }
});
</script>

</body>
</html>
