<!DOCTYPE html>
<html>
<head>

<title>FinTrack Pro - Bank Accounts</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#0f172a;
min-height:100vh;
color:#e2e8f0;
}

/* FULL WIDTH CONTAINER */

.container{
width:100%;
min-height:100vh;
background:#111827;
}

/* HEADER */

.header{
background:linear-gradient(
135deg,
#0f172a,
#1e293b
);
color:white;
padding:35px 50px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.header h1{
font-size:38px;
font-weight:700;
}

.header p{
margin-top:10px;
color:#94a3b8;
}

/* NAVIGATION */

nav{
background:#0b1220;
padding:18px 50px;
display:flex;
gap:20px;
align-items:center;
border-bottom:1px solid rgba(255,255,255,0.05);
}

nav a{
color:#94a3b8;
text-decoration:none;
font-size:15px;
font-weight:600;
padding:12px 18px;
border-radius:12px;
transition:.3s;
}

nav a:hover{
background:#1e293b;
color:white;
}

nav a.active{
background:#1e293b;
color:white;
}

/* SECTION */

.section{
padding:35px 50px;
}

.section h2{
color:white;
margin-bottom:25px;
font-size:26px;
}

/* FORMS */

.form-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
}

input,
select{
padding:14px;
border-radius:12px;
border:1px solid #334155;
background:#1e293b;
color:white;
font-size:15px;
}

input::placeholder{
color:#94a3b8;
}

/* BUTTONS */

button{
padding:13px 20px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
cursor:pointer;
transition:.3s;
font-weight:600;
}

button:hover{
background:#1d4ed8;
transform:translateY(-2px);
}

.add-btn{
margin-top:20px;
}

/* ACCOUNT CARDS */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.card{
background:#1e293b;
border:1px solid rgba(255,255,255,0.05);
border-radius:18px;
padding:25px;
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
border-color:#334155;
}

.card h3{
color:white;
font-size:20px;
}

.balance{
font-size:30px;
font-weight:700;
margin:15px 0;
color:#22c55e;
}

.type{
background:#1d4ed8;
padding:7px 14px;
border-radius:20px;
color:white;
font-size:13px;
}

/* EDIT & DELETE */

.edit{
background:#2563eb;
}

.edit:hover

.delete{
background:#dc2626;
}

.delete:hover

/* TRANSFER SECTION */

.transfer-box{
background:#1e293b;
border:1px solid rgba(255,255,255,0.05);
padding:25px;
border-radius:18px;
}

.transfer-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
}

.transfer-btn{
margin-top:20px;
}

/* RESPONSIVE */

@media(max-width:900px){

```
.form-grid,
.cards,
.transfer-grid{
    grid-template-columns:1fr;
}

nav{
    flex-wrap:wrap;
    padding:15px;
}

.header{
    padding:25px;
}

.section{
    padding:25px;
}

.header h1{
    font-size:30px;
}
```

}



</head>

</style>

<body>


<div class="container">



<div class="header">

<h1>FinTrack Pro</h1>
<p>Bank Accounts & Wallet Management</p>

</div>

<nav>

<a href="dashboard.html">Dashboard</a>

<a href="transactions.html">Transactions</a>

<a href="accounts.html" class="active">Accounts</a>

<a href="budgets.html">Budgets</a>

<a href="reports.html">Reports</a>

</nav>


<!-- ADD ACCOUNT -->


<div class="section">


<h2>Add / Edit Account</h2>


<div class="form-grid">


<input id="accountName" placeholder="Account Name">


<select id="accountType">


<option>Savings Account</option>
<option>Current Account</option>
<option>Credit Card</option>
<option>Cash Wallet</option>
<option>Digital Wallet</option>


</select>



<input id="balance" type="number" placeholder="Initial Balance">


</div>



<button class="add-btn" onclick="saveAccount()">

Add Account

</button>


</div>







<!-- ACCOUNT DISPLAY -->


<div class="section">


<h2>Your Accounts</h2>


<br>


<div class="cards" id="accountCards">


</div>


</div>








<!-- TRANSFER FUNDS -->


<div class="section">


<h2>Transfer Funds</h2>


<div class="transfer-box">


<div class="transfer-grid">


<select id="fromAccount">

</select>



<select id="toAccount">

</select>



<input id="transferAmount" type="number" placeholder="Amount">


</div>



<button class="transfer-btn" onclick="transferFunds()">

Transfer

</button>



</div>


</div>






</div>







<script>


let accounts =
JSON.parse(localStorage.getItem("accounts")) || [
{
    name:"Savings Account",
    type:"Savings Account",
    balance:5200
},
{
    name:"Current Account",
    type:"Current Account",
    balance:1850
},
{
    name:"Cash Wallet",
    type:"Cash Wallet",
    balance:350
}
];


let editIndex=-1;






function saveAccount(){

if(accountName.value.trim()=="" || balance.value==""){

    alert("Please fill all fields");

    return;

}
    let newAccount={

        name:accountName.value,
        type:accountType.value,
        balance:Number(balance.value)

    };

    if(editIndex==-1){

        accounts.push(newAccount);

    }
    else{

        accounts[editIndex]=newAccount;
        editIndex=-1;

    }

    localStorage.setItem(
        "accounts",
        JSON.stringify(accounts)
    );

    accountName.value="";
    balance.value="";

    displayAccounts();

}

function displayAccounts(){



let cards=document.getElementById("accountCards");


cards.innerHTML="";



fromAccount.innerHTML="";
toAccount.innerHTML="";




accounts.forEach((acc,index)=>{



cards.innerHTML += `


<div class="card">


<h3>${acc.name}</h3>


<p class="type">

${acc.type}

</p>



<div class="balance">

$${acc.balance}

</div>



<button class="edit" onclick="editAccount(${index})">

Edit

</button>



<button class="delete" onclick="deleteAccount(${index})">

Delete

</button>


</div>


`;




fromAccount.innerHTML+=`

<option value="${index}">
${acc.name}
</option>

`;


toAccount.innerHTML+=`

<option value="${index}">
${acc.name}
</option>

`;



});



}









function editAccount(i){


let acc=accounts[i];


accountName.value=acc.name;

accountType.value=acc.type;

balance.value=acc.balance;


editIndex=i;


window.scrollTo(0,0);


}

function deleteAccount(i){

    if(confirm("Delete account?")){

        accounts.splice(i,1);

        localStorage.setItem(
            "accounts",
            JSON.stringify(accounts)
        );

        displayAccounts();

    }

}


function transferFunds(){

    let from=fromAccount.value;

    let to=toAccount.value;

    let amount=Number(transferAmount.value);

if(amount <= 0){

    alert("Enter a valid amount");

    return;

}

    if(from==to){

        alert("Choose different accounts");

        return;

    }

    if(accounts[from].balance < amount){

        alert("Insufficient balance");

        return;

    }

    // Update balances
    accounts[from].balance -= amount;

    accounts[to].balance += amount;

    // Save updated accounts
    localStorage.setItem(
        "accounts",
        JSON.stringify(accounts)
    );

    // Add transfer transaction
    let transactions =
    JSON.parse(localStorage.getItem("transactions")) || [];

    transactions.push({

title:`Transfer: ${accounts[from].name} → ${accounts[to].name}`,

amount:amount,

type:"Transfer",

category:"Account Transfer",

date:new Date().toISOString().split("T")[0],

account:to

});

    // Save transactions
    localStorage.setItem(
        "transactions",
        JSON.stringify(transactions)
    );
alert("Transfer Successful");

transferAmount.value="";

displayAccounts();

}



displayAccounts();


</script>


</body>

</html>
