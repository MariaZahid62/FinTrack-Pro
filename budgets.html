<!DOCTYPE html>
<html>
<head>

<title>FinTrack Pro - Budget Planner</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}


body{

background:#f4f7fc;
padding:30px;

}


.container{

width:1100px;
max-width:95%;
margin:auto;
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,0.1);

}



/* HEADER */

.header{

background:#1e3a8a;
color:white;
padding:30px;

}


.header h1{

font-size:32px;

}


.header p{

margin-top:10px;
opacity:.9;

}



/* NAV */

nav{

background:#152c6b;
padding:15px 30px;
display:flex;
gap:25px;

}


nav a{

color:white;
text-decoration:none;
font-weight:bold;
padding:10px 15px;
border-radius:8px;

}


nav a:hover,
nav a.active{

background:white;
color:#1e3a8a;

}



/* CONTENT */


.section{

padding:30px;

}


h2{

color:#1e3a8a;
margin-bottom:20px;

}


/* CARDS */


.cards{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:30px;

}


.card{

padding:25px;
border-radius:12px;
color:white;
box-shadow:0 5px 15px rgba(0,0,0,.1);

}


.total{

background:linear-gradient(135deg,#1e3a8a,#3b82f6);

}


.spent{

background:linear-gradient(135deg,#dc2626,#ef4444);

}


.remaining{

background:linear-gradient(135deg,#16a34a,#22c55e);

}


.card h3{

font-size:16px;

}


.card p{

font-size:28px;
font-weight:bold;
margin-top:10px;

}



/* FORM */


.inputs{

display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;

}


input,
select{

padding:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;

}


button{

margin-top:20px;
padding:12px 25px;
border:none;
border-radius:8px;
background:#1e3a8a;
color:white;
cursor:pointer;

}


button:hover{

background:#152c6b;

}



/* BUDGET BOX */


.budget-box{

margin-top:30px;
padding:25px;
background:#f8fafc;
border-radius:12px;

}


.progress{

width:100%;
height:25px;
background:#ddd;
border-radius:20px;
overflow:hidden;

}


.progress-bar{

height:100%;
width:0%;
background:#2563eb;
transition:.5s;

}


.warning{

margin-top:15px;
font-weight:bold;
color:#dc2626;

}


.success{

margin-top:15px;
font-weight:bold;
color:#16a34a;

}



/* TABLE */


table{

width:100%;
border-collapse:collapse;
margin-top:25px;

}


th{

background:#1e3a8a;
color:white;
padding:12px;

}


td{

padding:12px;
text-align:center;
border-bottom:1px solid #ddd;

}



@media(max-width:800px){

.cards,
.inputs{

grid-template-columns:1fr;

}


}


</style>

</head>


<body>


<div class="container">


<div class="header">

<h1>FinTrack Pro</h1>

<p>Budget Planning Dashboard</p>

</div>


<nav>


<a href="dashboard.html">
Dashboard
</a>


<a href="transactions.html">
Transactions
</a>


<a href="accounts.html">
Accounts
</a>


<a href="budgets.html" class="active">
Budgets
</a>


<a href="reports.html">
Reports
</a>


</nav>




<div class="section">


<div class="cards">


<div class="card total">

<h3>Monthly Budget</h3>

<p id="totalBudget">
$0
</p>

</div>



<div class="card spent">

<h3>Total Spent</h3>

<p id="spent">
$0
</p>

</div>




<div class="card remaining">

<h3>Remaining Budget</h3>

<p id="remaining">
$0
</p>

</div>


</div>





<h2>Set Monthly Budget</h2>



<div class="inputs">


<input 
id="budgetAmount"
type="number"
placeholder="Enter Monthly Budget">


<select id="month">


<option>
January
</option>

<option>
February
</option>

<option>
March
</option>

<option>
April
</option>

<option>
May
</option>

<option>
June
</option>

<option>
July
</option>

<option>
August
</option>

<option>
September
</option>

<option>
October
</option>

<option>
November
</option>

<option>
December
</option>


</select>


</div>



<button onclick="saveBudget()">

Save Budget

</button>





<div class="budget-box">


<h2>
Budget Usage
</h2>



<div class="progress">

<div 
class="progress-bar"
id="progress">

</div>

</div>


<p id="message"></p>


</div>




<table>


<thead>

<tr>

<th>Month</th>

<th>Budget</th>

<th>Spent</th>

<th>Remaining</th>

</tr>

</thead>



<tbody id="budgetTable">


</tbody>


</table>




</div>


</div>





<script>


let budgets =
JSON.parse(localStorage.getItem("budgets")) || [];



function saveBudget(){


let amount =
Number(document.getElementById("budgetAmount").value);



let month =
document.getElementById("month").value;



if(amount<=0){

alert("Enter valid budget");

return;

}



let data={

month:month,

amount:amount

};



budgets.push(data);



localStorage.setItem(
"budgets",
JSON.stringify(budgets)
);



document.getElementById("budgetAmount").value="";


loadBudget();


}




function calculateSpent(){


let transactions =
JSON.parse(localStorage.getItem("transactions")) || [];


let expense=0;


transactions.forEach(t=>{


if(t.type=="Expense"){


expense += Number(t.amount);


}


});


return expense;


}




function loadBudget(){



let table =
document.getElementById("budgetTable");


table.innerHTML="";



let total=0;



budgets.forEach(b=>{


total += b.amount;



let spent =
calculateSpent();



let remain =
b.amount - spent;



table.innerHTML += `


<tr>


<td>${b.month}</td>


<td>$ ${b.amount}</td>


<td>$ ${spent}</td>


<td>$ ${remain}</td>



</tr>



`;



});



let spent =
calculateSpent();



let latest =
budgets[budgets.length-1];



if(latest){


let remaining =
latest.amount - spent;



document.getElementById("totalBudget").innerHTML =
"$ " + latest.amount;



document.getElementById("spent").innerHTML =
"$ " + spent;



document.getElementById("remaining").innerHTML =
"$ " + remaining;



let percent =
(spent/latest.amount)*100;



document.getElementById("progress").style.width =
percent+"%";




if(percent>=100){


document.getElementById("message").className="warning";


document.getElementById("message").innerHTML =
"⚠ Budget Exceeded! Spending limit crossed.";


}


else if(percent>=80){


document.getElementById("message").className="warning";


document.getElementById("message").innerHTML =
"⚠ Warning: You are close to your spending limit.";

}


else{


document.getElementById("message").className="success";


document.getElementById("message").innerHTML =
"✓ Good! You are within your budget.";

}



}



}



loadBudget();


</script>



</body>
</html>
