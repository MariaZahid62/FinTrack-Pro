<!DOCTYPE html>
<html>
<head>

<title>FinTrack Pro - Budget Planner</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#0f172a;
    min-height:100vh;
    color:#e2e8f0;
}

/* FULL WIDTH LAYOUT */

.container{
    width:100%;
    min-height:100vh;
    background:#111827;
}

/* HEADER */

.header{
    background:linear-gradient(
        135deg,
        #0f172a,
        #1e293b
    );
    color:white;
    padding:35px 50px;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

.header h1{
    font-size:38px;
    font-weight:700;
}

.header p{
    margin-top:10px;
    color:#94a3b8;
}

/* NAVIGATION */

nav{
    background:#0b1220;
    padding:18px 50px;
    display:flex;
    gap:20px;
    align-items:center;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

nav a{
    color:#94a3b8;
    text-decoration:none;
    font-weight:600;
    padding:12px 18px;
    border-radius:12px;
    transition:.3s;
}

nav a:hover{
    background:#1e293b;
    color:white;
}

nav a.active{
    background:#1e293b;
    color:white;
}

/* CONTENT */

.section{
    padding:35px 50px;
}

h2{
    color:white;
    margin-bottom:25px;
    font-size:26px;
}

/* SUMMARY CARDS */

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.card{
    padding:25px;
    border-radius:18px;
    color:white;
    border:1px solid rgba(255,255,255,0.08);
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.total{
    background:linear-gradient(135deg,#1e40af,#3b82f6);
}

.spent{
    background:linear-gradient(135deg,#dc2626,#ef4444);
}

.remaining{
    background:linear-gradient(135deg,#16a34a,#22c55e);
}

.card h3{
    font-size:15px;
    opacity:.9;
}

.card p{
    font-size:32px;
    font-weight:700;
    margin-top:10px;
}

/* FORM */

.inputs{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
}

input,
select{
    padding:14px;
    border:1px solid #334155;
    border-radius:12px;
    background:#1e293b;
    color:white;
    font-size:15px;
}

input::placeholder{
    color:#94a3b8;
}

button{
    margin-top:20px;
    padding:14px 25px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    font-weight:600;
    transition:.3s;
}

button:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
}

/* BUDGET BOX */

.budget-box{
    margin-top:30px;
    padding:30px;
    background:#1e293b;
    border:1px solid rgba(255,255,255,0.05);
    border-radius:18px;
}

.progress{
    width:100%;
    height:24px;
    background:#334155;
    border-radius:20px;
    overflow:hidden;
    margin-top:15px;
}

.progress-bar{
    height:100%;
    width:0%;
    background:linear-gradient(
        90deg,
        #2563eb,
        #60a5fa
    );
    transition:.5s;
}

.warning{
    margin-top:15px;
    font-weight:600;
    color:#ef4444;
}

.success{
    margin-top:15px;
    font-weight:600;
    color:#22c55e;
}

/* TABLE */

table{
    width:100%;
    border-collapse:collapse;
    margin-top:25px;
    background:#1e293b;
    border-radius:18px;
    overflow:hidden;
}

th{
    background:#111827;
    color:#60a5fa;
    padding:15px;
}

td{
    padding:15px;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,0.05);
    color:#e2e8f0;
}

tr:hover{
    background:#243244;
}

/* RESPONSIVE */

@media(max-width:900px){

    .cards,
    .inputs{
        grid-template-columns:1fr;
    }

    nav{
        flex-wrap:wrap;
        padding:15px;
    }

    .header{
        padding:25px;
    }

    .section{
        padding:25px;
    }

    .header h1{
        font-size:30px;
    }
}


</head>
</style>

<body>


<div class="container">


<div class="header">

<h1>FinTrack Pro</h1>

<p>Budget Planning Dashboard</p>

</div>


<nav>


<a href="dashboard.html">
Dashboard
</a>


<a href="transactions.html">
Transactions
</a>


<a href="accounts.html">
Accounts
</a>


<a href="budgets.html" class="active">
Budgets
</a>


<a href="reports.html">
Reports
</a>


</nav>




<div class="section">


<div class="cards">


<div class="card total">

<h3>Monthly Budget</h3>

<p id="totalBudget">
$0
</p>

</div>



<div class="card spent">

<h3>Total Spent</h3>

<p id="spent">
$0
</p>

</div>




<div class="card remaining">

<h3>Remaining Budget</h3>

<p id="remaining">
$0
</p>

</div>


</div>





<h2>Set Monthly Budget</h2>



<div class="inputs">


<input 
id="budgetAmount"
type="number"
placeholder="Enter Monthly Budget">


<select id="month">


<option>
January
</option>

<option>
February
</option>

<option>
March
</option>

<option>
April
</option>

<option>
May
</option>

<option>
June
</option>

<option>
July
</option>

<option>
August
</option>

<option>
September
</option>

<option>
October
</option>

<option>
November
</option>

<option>
December
</option>


</select>


</div>



<button onclick="saveBudget()">

Save Budget

</button>





<div class="budget-box">


<h2>
Budget Usage
</h2>



<div class="progress">

<div 
class="progress-bar"
id="progress">

</div>

</div>


<p id="message"></p>


</div>




<table>


<thead>

<tr>

<th>Month</th>

<th>Budget</th>

<th>Spent</th>

<th>Remaining</th>

</tr>

</thead>



<tbody id="budgetTable">


</tbody>


</table>




</div>


</div>





<script>


let budgets =
JSON.parse(localStorage.getItem("budgets")) || [];



function saveBudget(){


let amount =
Number(document.getElementById("budgetAmount").value);



let month =
document.getElementById("month").value;



if(amount<=0){

alert("Enter valid budget");

return;

}



let data={

month:month,

amount:amount

};



budgets.push(data);



localStorage.setItem(
"budgets",
JSON.stringify(budgets)
);



document.getElementById("budgetAmount").value="";


loadBudget();


}




function calculateSpent(){


let transactions =
JSON.parse(localStorage.getItem("transactions")) || [];


let expense=0;


transactions.forEach(t=>{


if(t.type=="Expense"){


expense += Number(t.amount);


}


});


return expense;


}




function loadBudget(){



let table =
document.getElementById("budgetTable");


table.innerHTML="";



let total=0;



budgets.forEach(b=>{


total += b.amount;



let spent =
calculateSpent();



let remain =
b.amount - spent;



table.innerHTML += `


<tr>


<td>${b.month}</td>


<td>$ ${b.amount}</td>


<td>$ ${spent}</td>


<td>$ ${remain}</td>



</tr>



`;



});



let spent =
calculateSpent();



let latest =
budgets[budgets.length-1];



if(latest){


let remaining =
latest.amount - spent;



document.getElementById("totalBudget").innerHTML =
"$ " + latest.amount;



document.getElementById("spent").innerHTML =
"$ " + spent;



document.getElementById("remaining").innerHTML =
"$ " + remaining;



let percent =
(spent/latest.amount)*100;



document.getElementById("progress").style.width =
percent+"%";




if(percent>=100){


document.getElementById("message").className="warning";


document.getElementById("message").innerHTML =
"⚠ Budget Exceeded! Spending limit crossed.";


}


else if(percent>=80){


document.getElementById("message").className="warning";


document.getElementById("message").innerHTML =
"⚠ Warning: You are close to your spending limit.";

}


else{


document.getElementById("message").className="success";


document.getElementById("message").innerHTML =
"✓ Good! You are within your budget.";

}



}



}



loadBudget();


</script>



</body>
</html>
